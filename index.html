<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>M Design Studio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#fff;
color:#222;
}


/* الصفحة الرئيسية */

.hero{
min-height:80vh;
background:linear-gradient(135deg,#ffffff,#dffaf7);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:30px;
}

.logo{
width:170px;
margin-bottom:20px;
}

h1{
font-size:45px;
color:#10aaa5;
}

.hero p{
font-size:20px;
margin-top:20px;
}


/* الخدمات */

section{
padding:50px 20px;
text-align:center;
}

.title{
color:#10aaa5;
font-size:32px;
margin-bottom:30px;
}


.cards{

display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;

}


.card{

width:300px;
padding:25px;
border-radius:20px;
background:white;
border:1px solid #10aaa5;

}


.card h3{

margin-bottom:15px;
color:#10aaa5;

}


button{

background:#10aaa5;
color:white;
border:none;
padding:12px 25px;
border-radius:25px;
cursor:pointer;

}



/* نافذة التصاميم */

.gallery{

display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
z-index:100;

align-items:center;
justify-content:center;

}


.gallery-box{

background:white;
width:90%;
max-width:700px;
padding:20px;
border-radius:20px;

display:grid;
grid-template-columns:1fr 1fr;
gap:15px;

}


.gallery-box img{

width:100%;
border-radius:15px;

}


.close{

position:absolute;
top:20px;
right:30px;
font-size:40px;
color:white;
cursor:pointer;

}

</style>

</head>


<body>


<div class="hero">

<img class="logo" src="logo.png.jpg">

<h1>M Design Studio</h1>

<p>
تصميم هويات بصرية ومنتجات رقمية باحترافية
</p>

</div>



<section>

<h2 class="title">
خدماتنا
</h2>


<div class="cards">


<div class="card">

<h3>
تصميم الشعارات
</h3>

<p>
شعارات احترافية تعكس هوية مشروعك
</p>

</div>



<div class="card">

<h3>
تصميم المنيو
</h3>

<p>
منيوهات عصرية للمطاعم والكافيهات
</p>

<button onclick="openGallery()">
عرض التصاميم
</button>

</div>



<div class="card">

<h3>
الهوية البصرية
</h3>

<p>
تصميم هوية متكاملة للعلامات التجارية
</p>

</div>



<div class="card">

<h3>
البوسترات الإعلانية
</h3>

<p>
تصاميم إعلانية للسوشيال ميديا والعروض
</p>

</div>


</div>

</section>




<div class="gallery" id="gallery">


<span class="close" onclick="closeGallery()">
×
</span>


<div class="gallery-box">


<img src="29af5ac23852679ebae26fa65d20f424.png">

<img src="2aa79027847b705c280faafd32b65841.jpeg">

<img src="bf3114097cccc4bfcb4b6cf27e623d23.png">

<img src="IMG_1155.jpeg">


</div>


</div>



<script>

function openGallery(){

document.getElementById("gallery").style.display="flex";

}


function closeGallery(){

document.getElementById("gallery").style.display="none";

}


</script>


</body>
</html>
