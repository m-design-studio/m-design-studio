<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>M Design Studio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#ffffff;
    color:#222;
}

.hero{
    min-height:100vh;
    background:linear-gradient(135deg,#ffffff,#dffaf7);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:30px;
}

.logo{
    width:180px;
    margin-bottom:20px;
}

h1{
    font-size:45px;
    color:#10aaa5;
    margin-bottom:15px;
}

.hero p{
    font-size:20px;
    max-width:600px;
    line-height:1.8;
}

.btn{
    display:inline-block;
    margin-top:30px;
    padding:15px 35px;
    background:#10aaa5;
    color:white;
    text-decoration:none;
    border-radius:30px;
}

section{
    padding:60px 20px;
    text-align:center;
}

.title{
    color:#10aaa5;
    font-size:32px;
    margin-bottom:30px;
}

.cards{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.card{
    width:300px;
    padding:25px;
    border-radius:20px;
    border:1px solid #10aaa5;
}

.card h3{
    margin-bottom:15px;
}

</style>

</head>

<body>



<div class="hero">

<img class="logo" src="logo.png.jpg" alt="M Design Studio Logo">

<h1>M Design Studio</h1>

<p>
نصمم هويات بصرية وتصاميم إبداعية تساعد العلامات التجارية على الظهور بشكل احترافي ومميز.
</p>

<a class="btn" href="#services">اكتشف خدماتنا</a>

</div>


<section id="services">

<h2 class="title">خدماتنا</h2>

<div class="cards">

<div class="card">
<h3>تصميم الشعارات</h3>
<p>تصميم شعار احترافي يعكس هوية مشروعك.</p>
</div>

<div class="card">
<h3>تصميم المنيو</h3>
<p>منيوهات عصرية للمطاعم والكافيهات.</p>
</div>

<div class="card">
<h3>الهوية البصرية</h3>
<p>بناء هوية متكاملة لعلامتك التجارية.</p>
</div>

</div>

</section>

</body>
</html>
