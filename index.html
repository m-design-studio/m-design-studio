<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M Design Studio</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#ffffff;
    color:#222;
}

header{
    background:#dffaf7;
    text-align:center;
    padding:40px 20px;
}

header img{
    width:150px;
}

h1{
    color:#18b7b0;
}

section{
    padding:30px 20px;
    text-align:center;
}

.card{
    background:#fff;
    border:1px solid #18b7b0;
    border-radius:15px;
    padding:20px;
    margin:15px auto;
    max-width:400px;
}

</style>
</head>

<body>

<header>
<img src="Logo.png" alt="M Design Studio Logo">
<h1>M Design Studio</h1>
<p>تصاميم إبداعية وهوية بصرية احترافية</p>
</header>

<section>
<div class="card">
<h2>خدماتنا</h2>
<p>تصميم شعارات - منيوهات - بوستات إعلانية - هويات بصرية</p>
</div>

<div class="card">
<h2>Portfolio</h2>
<p>نماذج من أعمالنا القادمة</p>
</div>
</section>

</body>
</html>
