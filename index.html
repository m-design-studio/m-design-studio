<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>M Design Studio</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="hero">

<img src="logo.png.jpg" class="logo" alt="M Design Studio">

<h1>M Design Studio</h1>

<p>
نصمم هويات بصرية، منيوهات، وبوسترات إعلانية باحترافية
</p>

</header>


<section class="services">

<h2>خدماتنا</h2>


<div class="cards">


<div class="card">

<h3>تصميم الشعارات</h3>

<p>
شعارات احترافية تعكس هوية مشروعك.
</p>

<button onclick="openGallery('logo')">
عرض التصاميم
</button>

</div>



<div class="card">

<h3>تصميم المنيو</h3>

<p>
تصاميم منيو عصرية للمطاعم والكافيهات.
</p>

<button onclick="openGallery('menu')">
عرض التصاميم
</button>

</div>



<div class="card">

<h3>الهوية البصرية</h3>

<p>
هوية متكاملة للعلامات التجارية.
</p>

<button onclick="openGallery('brand')">
عرض التصاميم
</button>

</div>



<div class="card">

<h3>البوسترات الإعلانية</h3>

<p>
تصاميم إعلانية للسوشيال ميديا.
</p>

<button onclick="openGallery('poster')">
عرض التصاميم
</button>

</div>


</div>

</section>



<div class="gallery" id="gallery">

<span class="close" onclick="closeGallery()">×</span>

<div class="gallery-content">

<button class="gallery-btn" onclick="prevImage()" title="الصورة السابقة">❮</button>

<img id="galleryImage">

<button class="gallery-btn" onclick="nextImage()" title="الصورة التالية">❯</button>

<button onclick="nextImage()">›</button>

</div>

</div>



<script src="script.js"></script>

</body>
</html>
