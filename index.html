<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>M Design Studio</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:#fff;
color:#222;
}

.hero{
background:linear-gradient(135deg,#ffffff,#dffaf7);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:30px;
}

.logo{
width:180px;
margin-bottom:20px;
}

h1{
color:#10aaa5;
font-size:45px;
}

.hero p{
font-size:20px;
margin:20px 0;
line-height:1.8;
}

.btn{
background:#10aaa5;
color:white;
padding:15px 35px;
border-radius:30px;
text-decoration:none;
}

section{
padding:50px 20px;
text-align:center;
}

.title{
color:#10aaa5;
font-size:32px;
margin-bottom:30px;
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.card{
width:300px;
border:1px solid #10aaa5;
border-radius:20px;
padding:15px;
overflow:hidden;
}

.card img{
width:100%;
border-radius:15px;
}

</style>

</head>

<body>

<div class="hero">

<img class="logo" src="logo.png.jpg" alt="M Design Studio Logo">

<h1>M Design Studio</h1>

<p>
اكتشف خدماتنا في التصميم الإبداعي وبناء الهوية البصرية.
</p>

<a class="btn" href="#services">
اكتشف خدماتنا
</a>

</div>


<section id="services">

<h2 class="title">خدماتنا</h2>

<div class="cards">

<div class="card">
<h3>تصميم الشعارات</h3>
<p>شعارات احترافية تناسب علامتك التجارية.</p>
</div>

<div class="card">
<h3>تصميم المنيو</h3>
<p>منيوهات عصرية للمطاعم والكافيهات.</p>
</div>

<div class="card">
<h3>الهوية البصرية</h3>
<p>تصميم هوية متكاملة لمشروعك.</p>
</div>

</div>

</section>


<section>

<h2 class="title">أعمالنا</h2>

<div class="cards">

<div class="card">
<img src="29af5ac23852679ebae26fa65d20f424.png">
</div>

<div class="card">
<img src="2aa79027847b705c280faafd32b65841.jpeg">
</div>

<div class="card">
<img src="bf3114097cccc4bfcb4b6cf27e623d23.png">
</div>

<div class="card">
<img src="IMG_1155.jpeg">
</div>

</div>

</section>


</body>
</html>
