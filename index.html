<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>M Design Studio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#fff;
color:#222;
}


.hero{
min-height:80vh;
background:linear-gradient(135deg,#fff,#dffaf7);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:30px;
}

.logo{
width:170px;
}

h1{
margin-top:20px;
font-size:45px;
color:#10aaa5;
}

.hero p{
font-size:20px;
margin-top:15px;
}


section{
padding:50px 20px;
text-align:center;
}


.title{
color:#10aaa5;
font-size:32px;
margin-bottom:30px;
}


.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}


.card{
width:300px;
padding:25px;
border-radius:20px;
border:1px solid #10aaa5;
}


.card h3{
color:#10aaa5;
margin-bottom:15px;
}


button{

background:#10aaa5;
color:white;
border:none;
padding:12px 25px;
border-radius:25px;
cursor:pointer;
margin-top:15px;

}



/* معرض الصور */

.gallery{

display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
align-items:center;
justify-content:center;
z-index:99;

}


.gallery-box{

background:white;
padding:20px;
border-radius:20px;
display:flex;
align-items:center;
gap:20px;
width:90%;
max-width:600px;

}


.gallery-box img{

width:80%;
max-height:500px;
object-fit:contain;
border-radius:15px;

}


.arrow{

font-size:35px;
cursor:pointer;
color:#10aaa5;

}


.close{

position:absolute;
top:20px;
right:30px;
font-size:40px;
color:white;
cursor:pointer;

}


</style>

</head>


<body>


<div class="hero">

<img class="logo" src="logo.png.jpg">

<h1>M Design Studio</h1>

<p>
تصميم هويات بصرية ومنتجات رقمية باحترافية
</p>

</div>



<section>

<h2 class="title">
خدماتنا
</h2>


<div class="cards">


<div class="card">
<h3>تصميم الشعارات</h3>
<p>شعارات احترافية تعكس هوية مشروعك.</p>
</div>



<div class="card">

<h3>تصميم المنيو</h3>

<p>
منيوهات عصرية للمطاعم والكافيهات.
</p>

<button onclick="openGallery()">
عرض التصاميم
</button>

</div>



<div class="card">
<h3>الهوية البصرية</h3>
<p>
تصميم هوية متكاملة للعلامات التجارية.
</p>
</div>



<div class="card">
<h3>البوسترات الإعلانية</h3>
<p>
تصاميم إعلانية للسوشيال ميديا.
</p>
</div>



</div>

</section>



<div class="gallery" id="gallery">


<span class="close" onclick="closeGallery()">×</span>


<div class="gallery-box">


<span class="arrow" onclick="prevImage()">‹</span>


<img id="menuImage" src="29af5ac23852679ebae26fa65d20f424.png">


<span class="arrow" onclick="nextImage()">›</span>


</div>


</div>



<script>

let images=[
"29af5ac23852679ebae26fa65d20f424.png",
"2aa79027847b705c280faafd32b65841.jpeg",
"bf3114097cccc4bfcb4b6cf27e623d23.png",
"IMG_1155.jpeg"
];


let current=0;


function openGallery(){

document.getElementById("gallery").style.display="flex";

}


function closeGallery(){

document.getElementById("gallery").style.display="none";

}



function nextImage(){

current++;

if(current>=images.length){
current=0;
}

document.getElementById("menuImage").src=images[current];

}



function prevImage(){

current--;

if(current<0){
current=images.length-1;
}

document.getElementById("menuImage").src=images[current];

}


</script>


</body>
</html>
